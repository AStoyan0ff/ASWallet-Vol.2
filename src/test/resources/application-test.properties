spring.datasource.url=jdbc:h2:mem:as_wallet_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=1000
spring.mail.properties.mail.smtp.timeout=1000
spring.mail.properties.mail.smtp.writetimeout=1000

server.port=0
server.address=127.0.0.1

spring.task.scheduling.enabled=false
spring.main.lazy-initialization=false

app.risk-service.enabled=false
app.risk-service.fail-open=true
app.risk-service.base-url=http://localhost:9
app.risk-service.api-key=test-api-key

app.transfer.processing-delay-seconds=3600
app.transfer.failure-rate=0
app.transfer.process.cron=-
app.transfer.stale-check.fixed-delay-ms=3600000
app.password-reset.cleanup.cron=-

app.admin.password=Admin123!
app.upload.avatars-dir=${java.io.tmpdir}/aswallet-test-avatars

logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.type.descriptor=off
logging.level.STARTER=WARN
