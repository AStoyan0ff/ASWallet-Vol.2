<!DOCTYPE html>
<!-- Advanced — admin panel -->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Admin Panel - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet body-admin">

<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/5.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--admin wallet-panel--materialize reveal-child">

        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
        </div>

        <h2 class="wallet-title wallet-title--center auth-stagger">System Administration</h2>

        <p class="wallet-greeting auth-stagger">
            Signed in as <span class="wallet-username" th:text="${currentUsername}"></span>
        </p>

        <div class="success auth-stagger" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="admin-tools-section auth-stagger" aria-label="Admin tools">
            <h3 class="wallet-quick-actions-title">Admin Tools</h3>
            <div class="wallet-quick-actions-grid admin-tools-grid">
                <a class="wallet-quick-action wallet-quick-action--send" th:href="@{/admin/messages/send}">
                    <span class="wallet-quick-action-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M22 2L11 13"/>
                            <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </span>
                    <span class="wallet-quick-action-label">Send Message</span>
                </a>
                <a class="wallet-quick-action wallet-quick-action--inbox wallet-quick-action--badge"
                   th:href="@{/admin/messages/inbox}">
                    <span class="wallet-quick-action-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <path d="M3 7l9 6 9-6"/>
                        </svg>
                    </span>
                    <span class="wallet-quick-action-label">Message Inbox</span>
                    <span class="wallet-quick-action-badge"
                          th:if="${adminInboxUnreadCount > 0}"
                          th:text="${adminInboxUnreadCount}"></span>
                </a>
                <a class="wallet-quick-action wallet-quick-action--login-activity wallet-quick-action--badge"
                   th:href="@{/admin/risk-reviews}">
                    <span class="wallet-quick-action-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M12 3l7 4v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V7l7-4z"/>
                            <path d="M9 12l2 2 4-4"/>
                        </svg>
                    </span>
                    <span class="wallet-quick-action-label">Risk Reviews</span>
                    <span class="wallet-quick-action-badge"
                          th:if="${pendingRiskReviewCount > 0}"
                          th:text="${pendingRiskReviewCount}"></span>
                </a>
                <button type="button"
                        id="adminManageTool"
                        class="wallet-quick-action wallet-quick-action--admin-manage admin-tool-action"
                        aria-disabled="true">
                    <span class="wallet-quick-action-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M4 20c1.5-4 6.5-4 8-4s6.5 0 8 4"/>
                            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                        </svg>
                    </span>
                    <span class="wallet-quick-action-label">Manage</span>
                </button>
                <button type="button"
                        id="adminRemoveTool"
                        class="wallet-quick-action wallet-quick-action--admin-remove admin-tool-action"
                        aria-disabled="true">
                    <span class="wallet-quick-action-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M3 6h18"/>
                            <path d="M8 6V4h8v2"/>
                            <path d="M6 6l1 14h10l1-14"/>
                        </svg>
                    </span>
                    <span class="wallet-quick-action-label">Remove</span>
                </button>
            </div>
            <p class="admin-user-action-hint" id="adminUserActionHint">Select a user below, then use Manage or
                Remove.</p>
            <form id="adminRemoveForm" method="post" class="admin-remove-form" hidden>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </form>
        </section>

        <section class="admin-users-section auth-stagger" id="user-accounts" aria-label="User accounts">
            <h3 class="wallet-quick-actions-title">User Accounts</h3>

            <div class="admin-user-list-scroll" th:if="${!#lists.isEmpty(users)}">
                <div class="admin-user-list">
                    <article class="admin-user-card"
                             th:each="user : ${users}"
                             tabindex="0"
                             th:attr="data-user-id=${user.id},
                                  data-username=${user.username},
                                  data-manageable=${user.username != currentUsername and (isPrimaryAdmin ? user.username != primaryAdminUsername : user.role.name() == 'USER')},
                                  data-removable=${user.username != currentUsername and user.role.name() == 'USER' and (isPrimaryAdmin ? user.username != primaryAdminUsername : true)},
                                  data-manage-url=@{/admin/users/{id}/manage(id=${user.id})},
                                  data-delete-url=@{/admin/users/{id}/delete(id=${user.id})}">
                        <div class="admin-user-card__main">
                            <div class="admin-user-card__identity">
                                <strong class="admin-user-card__name" th:text="${user.username}"></strong>
                                <span class="admin-user-card__email" th:text="${user.email}"></span>

                                <span class="admin-user-card__identity-flag admin-muted"
                                      th:if="${user.username == currentUsername or (user.username != currentUsername and !(isPrimaryAdmin ? user.username != primaryAdminUsername : user.role.name() == 'USER'))}"
                                      th:text="${user.username == currentUsername ? 'You' : 'Protected'}">
                            </span>
                            </div>
                            <div class="admin-user-card__meta">
                            <span class="type-chip admin-user-card__meta-chip admin-user-card__meta-chip--role"
                                  th:classappend="${user.primaryAdminAccount} ? ' type-chip--super-admin' : (${user.role.name() == 'ADMIN'} ? ' type-chip--admin' : '')"
                                  th:text="${user.roleDisplay}"></span>
                                <span class="admin-user-card__balance">
                                <span th:text="${user.balance}"></span>
                                <span th:text="${user.currency}"></span>
                            </span>
                                <span class="admin-user-card__registered" th:text="${user.createdAt}"></span>
                                <span class="status-chip admin-user-card__meta-chip admin-user-card__meta-chip--status status-chip--active"
                                      th:if="${user.accountStatus.name() == 'ACTIVE'}">Active
                            </span>
                                <span class="status-chip admin-user-card__meta-chip admin-user-card__meta-chip--status status-chip--inactive"
                                      th:if="${user.accountStatus.name() == 'INACTIVE'}">Inactive
                            </span>
                            </div>
                        </div>
                    </article>
                </div>
            </div>

            <p class="tx-empty" th:if="${#lists.isEmpty(users)}">No users found.</p>
        </section>

    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
