<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Register - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-auth body-auth-register body-auth-light-card body-auth-gold-panel">

<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/reg-log.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="auth-landing reveal-item">
    <section class="auth-login-card auth-login-card--register reveal-child">
        <a class="auth-login-back" th:href="@{/}" aria-label="Back to home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 12H5"/>
                <path d="M12 19l-7-7 7-7"/>
            </svg>
            <span class="auth-login-back__label">Back to home</span>
        </a>

        <header class="auth-login-card__header auth-stagger">
            <div class="auth-login-logo">
                <img class="auth-login-logo__img" th:src="@{/images/asset/aswallet-logo.png}" alt="ASWallet">
            </div>
            <h1 class="auth-login-card__title">Create your account</h1>
            <p class="auth-login-card__subtitle">Simple. Secure. Smart.</p>
            <div class="auth-login-divider" aria-hidden="true">
                <span class="auth-login-divider__line"></span>
                <span class="auth-login-divider__gem"></span>
                <span class="auth-login-divider__line"></span>
            </div>
        </header>

        <div class="success auth-stagger" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="auth-login-form" th:action="@{/register}" th:object="${userDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth-login-field auth-stagger">
                <label class="auth-login-label" for="username">Username</label>
                <div class="auth-login-input-wrap">
                    <span class="auth-login-input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                    </span>
                    <input id="username" type="text" th:field="*{username}" placeholder="Username" required>
                </div>
                <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="auth-login-field auth-stagger">
                <label class="auth-login-label" for="email">Email</label>
                <div class="auth-login-input-wrap">
                    <span class="auth-login-input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <path d="M3 7l9 6 9-6"/>
                        </svg>
                    </span>
                    <input id="email" type="email" th:field="*{email}" placeholder="Email" required>
                </div>
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="auth-login-field auth-stagger">
                <label class="auth-login-label" for="password">Password</label>
                <div class="auth-login-input-wrap password-field-wrap">
                    <span class="auth-login-input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="5" y="11" width="14" height="10" rx="2"/>
                            <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                        </svg>
                    </span>
                    <input id="password" type="password" th:field="*{password}" placeholder="Password" required>
                    <button type="button" th:replace="~{fragments/password-visibility-toggle :: toggle}"></button>
                </div>
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="auth-login-field auth-stagger">
                <label class="auth-login-label" for="confirmPassword">Confirm Password</label>
                <div class="auth-login-input-wrap password-field-wrap">
                    <span class="auth-login-input-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3l7 4v5c0 4.2-3 7.8-7 9-4-1.2-7-4.8-7-9V7l7-4z"/>
                            <path d="M9.5 12.5l1.8 1.8 3.5-3.6"/>
                        </svg>
                    </span>
                    <input id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Confirm password" required>
                    <button type="button" th:replace="~{fragments/password-visibility-toggle :: toggle}"></button>
                </div>
                <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                <div class="error" th:if="${#fields.hasErrors('passwordConfirmMatching')}" th:errors="*{passwordConfirmMatching}"></div>
            </div>

            <p class="auth-login-note auth-stagger">After registration, add a bank card in Bank Details to receive a €50.00 welcome bonus.</p>

            <div class="auth-login-field auth-stagger">
                <button type="submit" class="auth-login-submit">Register</button>
            </div>
        </form>

        <div class="auth-login-or auth-stagger" aria-hidden="true">
            <span class="auth-login-or__line"></span>
            <span class="auth-login-or__text">OR</span>
            <span class="auth-login-or__line"></span>
        </div>

        <a class="auth-login-register auth-stagger" th:href="@{/login}">Login here</a>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/password-toggle.js}"></script>
</body>
</html>
