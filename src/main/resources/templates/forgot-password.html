<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Forgot Password - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-auth body-auth-forgot-password body-auth-forgot-password-light body-auth-forgot-password-gold-panel">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/forgot-password.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="auth-landing reveal-item">
    <section class="auth-panel auth-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/login}">Back to login</a>
        </div>
        <h2 class="auth-title auth-title--center auth-stagger">Forgot password</h2>
        <p class="form-panel-subtitle auth-stagger">Enter your email and we will send you a reset link.</p>

        <div class="success auth-stagger" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="auth-form" th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth-field-group auth-stagger">
                <label for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" placeholder="you@email.com" required>
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="auth-field-group auth-stagger">
                <button type="submit" class="auth-submit">Send reset link</button>
            </div>
        </form>

        <p class="auth-footer-note auth-stagger">
            Remember your password?
            <a class="auth-link" th:href="@{/login}">Login here</a>
        </p>
    </section>
</main>
<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
