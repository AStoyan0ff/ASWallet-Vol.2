<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Deposit ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/4.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--form wallet-panel--deposit wallet-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
        </div>
        <h2 class="wallet-title wallet-title--center auth-stagger">Deposit</h2>
        <p class="wallet-form-hint auth-stagger">ASWallet balance from your bank card</p>

        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="deposit-flow auth-stagger" th:if="${savedBankCard}">
            <div class="deposit-flow-end">
                <p class="deposit-flow-label">From Bank card</p>
                <p class="deposit-flow-value" th:text="${savedBankCard.maskedCardNumber}"></p>
                <p class="deposit-flow-meta">
                    <span th:text="${savedBankCard.cardholderName}"></span> *
                    <span th:text="${savedBankCard.expiryMonth}"></span>/<span
                        th:text="${savedBankCard.expiryYear}"></span>
                </p>
            </div>

            <div class="deposit-flow-arrow" aria-hidden="true">↓</div>

            <div class="deposit-flow-end deposit-flow-end--wallet">
                <p class="deposit-flow-label">To ASWallet</p>
                <p class="deposit-flow-value">
                    <span th:text="${wallet.balance}"></span>
                    <span th:text="${wallet.currency}"></span>
                </p>
                <p class="deposit-flow-meta">Current balance <span th:text="${wallet.username}"></span></p>
            </div>
        </div>

        <div class="withdraw-no-card auth-stagger" th:unless="${savedBankCard}">
            <p>No bank card registered.</p>
            <a class="auth-link" th:href="@{/wallet/bank-details}">Bank Details</a>
        </div>

        <form class="auth-form" th:action="@{/transactions/deposit}" th:object="${depositMoneyDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth-field-group auth-stagger">
                <label for="amount">Amount to add</label>
                <input id="amount" type="number" step="0.01" min="0.01" max="999999.99" th:field="*{amount}"
                       placeholder="0.00" required
                       th:disabled="${savedBankCard == null}">
                <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <div class="auth-field-group auth-stagger"
                 th:replace="~{fragments/spending-category-field :: field(${savedBankCard == null})}"></div>

            <div class="auth-field-group auth-stagger">
                <label for="cardCvc">Card CVC</label>
                <input id="cardCvc" type="password" th:field="*{cardCvc}"
                       placeholder="123" inputmode="numeric" autocomplete="cc-csc"
                       pattern="[0-9]{3}" maxlength="3" required
                       th:disabled="${savedBankCard == null}">
                <div class="error" th:if="${#fields.hasErrors('cardCvc')}" th:errors="*{cardCvc}"></div>
                <p class="deposit-cvc-hint" th:if="${savedBankCard}">CVC confirms the charge on your bank card.</p>
            </div>

            <div class="auth-field-group auth-stagger">
                <button type="submit" class="auth-submit" th:disabled="${savedBankCard == null}">Confirm Deposit
                </button>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/deposit.js}"></script>
</body>
</html>
