<!DOCTYPE html>
<!-- Advanced — admin login activity -->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Login Activity - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet body-admin body-admin-login-activity">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/5.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--admin wallet-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
        </div>

        <h2 class="wallet-title wallet-title--center auth-stagger">Login Activity</h2>
        <p class="wallet-greeting auth-stagger">Last 10 successful sign-ins across the system</p>
        <p class="login-activity-hint auth-stagger">Sign in from another device using your PC LAN address (e.g. http://192.168.x.x:8080) to record real client IPs.</p>

        <div class="login-activity-wrap auth-stagger" th:if="${!#lists.isEmpty(loginActivities)}">
            <table class="login-activity-table">
                <thead>
                <tr>
                    <th>Username</th>
                    <th>IP address</th>
                    <th>Date &amp; time</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${loginActivities}">
                    <td th:text="${entry.username}"></td>
                    <td th:text="${entry.ipAddress}"></td>
                    <td th:text="${entry.loggedInAt}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <p class="tx-empty auth-stagger" th:if="${#lists.isEmpty(loginActivities)}">No login activity recorded yet.</p>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
