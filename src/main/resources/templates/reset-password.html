<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Reset Password - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-auth body-auth-reset-password body-auth-reset-password-gold-panel">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/res-pass.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="auth-landing reveal-item">
    <section class="auth-panel auth-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/login}">Back to login</a>
        </div>
        <h2 class="auth-title auth-title--center auth-stagger">Reset password</h2>
        <p class="form-panel-subtitle auth-stagger">Choose a new password for your account.</p>
        <p class="form-panel-subtitle auth-stagger">Your new password must be different from your current one.</p>

        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="auth-form" th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{token}">

            <div class="auth-field-group auth-stagger">
                <label for="newPassword">New password</label>
                <div class="password-field-wrap">
                    <input id="newPassword" type="password" th:field="*{newPassword}" placeholder="Enter new password" required>
                    <button type="button" th:replace="~{fragments/password-visibility-toggle :: toggle}"></button>
                </div>
                <div class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="auth-field-group auth-stagger">
                <label for="confirmPassword">Confirm new password</label>
                <div class="password-field-wrap">
                    <input id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Confirm new password" required>
                    <button type="button" th:replace="~{fragments/password-visibility-toggle :: toggle}"></button>
                </div>
                <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                <div class="error" th:if="${#fields.hasErrors('passwordConfirmMatching')}" th:errors="*{passwordConfirmMatching}"></div>
            </div>

            <div class="auth-field-group auth-stagger">
                <button type="submit" class="auth-submit">Update password</button>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/password-toggle.js}"></script>
</body>
</html>
