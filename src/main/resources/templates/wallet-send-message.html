<!DOCTYPE html>
<!--Advanced: users send message to admin -->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Send Message - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet body-wallet-send-message body-wallet-send-message-light body-wallet-send-message-gold-panel">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/mailbox.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section
            class="wallet-panel wallet-panel--form wallet-panel--admin-send-message wallet-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
        </div>

        <h2 class="wallet-title wallet-title--center auth-stagger">Send Message</h2>
        <p class="wallet-greeting auth-stagger">
            Signed in as <span class="wallet-username" th:text="${currentUsername}"></span>
        </p>
        <p class="admin-send-message-hint auth-stagger">Send a message to an admin.</p>

        <div class="success auth-stagger" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="admin-manage-form admin-send-message-form auth-stagger"
              th:action="@{/wallet/messages/send}"
              th:object="${userSendMessageRequest}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="admin-field-label" for="userMailboxAdmin">Admin</label>
            <select id="userMailboxAdmin"
                    class="admin-mailbox-input"
                    th:field="*{adminUsername}"
                    required>
                <option value="">Select admin...</option>
                <option th:each="admin : ${adminRecipients}"
                        th:value="${admin.username}"
                        th:text="${admin.displayName}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('adminUsername')}" th:errors="*{adminUsername}"></div>

            <label class="admin-field-label" for="userMailboxMessage">Message</label>
            <textarea id="userMailboxMessage"
                      class="admin-mailbox-input admin-mailbox-textarea"
                      th:field="*{message}"
                      rows="5"
                      placeholder="Write your message..."
                      required></textarea>
            <div class="error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></div>

            <div class="admin-send-message-actions">
                <button type="submit" class="wallet-btn admin-action-btn admin-action-btn--update">Send</button>
                <a class="wallet-btn wallet-btn-danger" th:href="@{/wallet}">Cancel</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
