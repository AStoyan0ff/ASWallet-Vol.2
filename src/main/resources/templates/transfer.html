<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Transfer ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="body-wallet">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/transfer.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--form wallet-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
        </div>

        <h2 class="wallet-title wallet-title--center auth-stagger">Transfer Money</h2>
        <p class="wallet-form-hint auth-stagger">Enter the receiver's username. Funds go to their wallet linked to their registered bank card.</p>

        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="auth-form" th:action="@{/transactions/transfer}" th:object="${transferMoneyDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth-field-group auth-stagger">
                <label for="receiverUsername">Receiver username</label>
                <input id="receiverUsername" type="text" th:field="*{receiverUsername}" placeholder="e.g. john_doe" required>
                <div class="error" th:if="${#fields.hasErrors('receiverUsername')}" th:errors="*{receiverUsername}"></div>
            </div>

            <div class="auth-field-group auth-stagger">
                <label for="amount">Amount</label>
                <input id="amount" type="number" step="0.01" min="0.01" max="999999.99" th:field="*{amount}" placeholder="0.00" required>
                <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <div class="auth-field-group auth-stagger" th:replace="~{fragments/spending-category-field :: field(false)}"></div>

            <div class="auth-field-group auth-stagger">
                <button type="submit" class="auth-submit">Review Transfer</button>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
