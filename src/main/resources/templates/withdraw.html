<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Withdraw - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet body-withdraw-light body-withdraw-gold-panel">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/deposit.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--form wallet-panel--withdraw wallet-panel--materialize reveal-child">
        <div class="form-panel-top auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
        </div>
        <h2 class="wallet-title wallet-title--center auth-stagger">WITHDRAW</h2>
        <p class="wallet-form-hint auth-stagger">Withdraw from your registered bank card</p>

        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="withdraw-limit-summary auth-stagger"
             th:if="${withdrawDailyLimit != null and withdrawDailyLimit.applies}">
            <p class="withdraw-limit-line">
                Daily withdraw limit:
                <span th:text="${'€ ' + #numbers.formatDecimal(withdrawDailyLimit.dailyLimit, 1, 'NONE', 2, 'POINT')}"></span>
            </p>
            <p class="withdraw-limit-line">
                Withdrawn today:
                <span th:text="${'€ ' + #numbers.formatDecimal(withdrawDailyLimit.withdrawnToday, 1, 'NONE', 2, 'POINT')}"></span>
            </p>
            <p class="withdraw-limit-line withdraw-limit-line--remaining">
                Remaining:
                <span th:text="${'€ ' + #numbers.formatDecimal(withdrawDailyLimit.remainingToday, 1, 'NONE', 2, 'POINT')}"></span>
            </p>
        </div>

        <form class="auth-form" th:action="@{/transactions/withdraw}" th:object="${withdrawMoneyDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="auth-field-group auth-stagger">
                <label for="fromCard">From</label>
                <input th:if="${savedBankCard}"
                       id="fromCard"
                       type="text"
                       class="withdraw-from-field"
                       readonly
                       th:value="${savedBankCard.maskedCardNumber + '  ' + savedBankCard.cardholderName + '  ' + savedBankCard.expiryMonth + '/' + savedBankCard.expiryYear}">
                <div class="withdraw-no-card" th:unless="${savedBankCard}">
                    <p>No bank card registered.</p>
                    <a class="auth-link" th:href="@{/wallet/bank-details}">Bank Details</a>
                </div>
            </div>

            <div class="auth-field-group auth-stagger">
                <label for="amount">Amount</label>
                <input id="amount"
                       type="number"
                       step="0.01"
                       min="0.01"
                       th:field="*{amount}"
                       placeholder="0.00"
                       required
                       th:disabled="${savedBankCard == null}"
                       th:max="${withdrawDailyLimit != null and withdrawDailyLimit.applies ? withdrawDailyLimit.remainingToday : 999999.99}">
                <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <div class="auth-field-group auth-stagger" th:replace="~{fragments/spending-category-field :: field(${savedBankCard == null})}"></div>

            <div class="auth-field-group auth-stagger">
                <button type="submit"
                    class="auth-submit"
                    th:disabled="${savedBankCard == null or (withdrawDailyLimit != null and withdrawDailyLimit.applies and withdrawDailyLimit.remainingToday <= 0)}">Confirm Withdrawal
                </button>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
