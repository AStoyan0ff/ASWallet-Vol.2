<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Risk Reviews - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet body-admin body-admin-risk-reviews body-admin-risk-reviews-wallet-panel">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/5.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--admin wallet-panel--wide wallet-panel--admin-risk-reviews wallet-panel--materialize reveal-child">
        <div class="form-panel-top form-panel-top--split auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/admin}">Back to admin</a>

            <form th:if="${!#lists.isEmpty(assessments)}"
                  th:action="@{/admin/risk-reviews/clear}"
                  method="post"
                  class="risk-reviews-clear-form"
                  onsubmit="return confirm('Delete all pending risk reviews? Linked transfers will be cancelled and funds returned to senders.');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="home-pill risk-reviews-clear-btn">Delete all reviews</button>
            </form>
        </div>

        <h2 class="wallet-title wallet-title--center auth-stagger">Pending Risk Reviews</h2>
        <p class="wallet-greeting auth-stagger">
            Signed in as <span class="wallet-username" th:text="${currentUsername}"></span>
        </p>
        <p class="login-activity-hint auth-stagger">
            Transfers flagged for manual review by the risk microservice.
        </p>

        <div class="success auth-stagger" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="risk-reviews-table-wrap auth-stagger" th:if="${!#lists.isEmpty(assessments)}">
            <table class="risk-reviews-table">
                <colgroup>
                    <col class="risk-col-user">
                    <col class="risk-col-user">
                    <col class="risk-col-amount">
                    <col class="risk-col-score">
                    <col class="risk-col-level">
                    <col class="risk-col-transaction">
                    <col class="risk-col-created">
                    <col class="risk-col-reasons">
                    <col class="risk-col-actions">
                </colgroup>
                <thead>
                <tr>
                    <th>From</th>
                    <th>To</th>
                    <th>Amount</th>
                    <th>Score</th>
                    <th>Level</th>
                    <th>Transaction</th>
                    <th>Created</th>
                    <th>Reasons</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${assessments}">
                    <td th:text="${item.senderUsername}"></td>
                    <td th:text="${item.receiverUsername}"></td>
                    <td th:text="${item.amount}"></td>
                    <td>
                        <span class="risk-score-chip" th:text="${item.riskScore}"></span>
                    </td>
                    <td>
                        <span class="risk-level-chip"
                              th:classappend="| risk-level-chip--${#strings.toLowerCase(item.riskLevel)}|"
                              th:text="${item.riskLevel}"></span>
                    </td>
                    <td class="risk-transaction-ref" th:text="${item.transactionRef} ?: '-'"></td>
                    <td th:text="${item.createdAt}"></td>
                    <td>
                        <ul class="risk-reasons-list" th:if="${item.reasons != null}">
                            <li th:each="reason : ${item.reasons}" th:text="${reason}"></li>
                        </ul>
                    </td>
                    <td class="risk-review-actions">
                        <div class="risk-review-actions-row">
                            <form th:action="@{/admin/risk-reviews/{id}/approve(id=${item.id})}" method="post" class="risk-review-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="wallet-btn admin-action-btn admin-action-btn--update">Approve</button>
                            </form>
                            <form th:action="@{/admin/risk-reviews/{id}/reject(id=${item.id})}" method="post" class="risk-review-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="wallet-btn wallet-btn-danger">Reject</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <p class="tx-empty auth-stagger" th:if="${#lists.isEmpty(assessments)}">
            No pending risk reviews right now.
        </p>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
