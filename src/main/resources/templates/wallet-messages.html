<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Message Inbox - ASWallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-wallet body-wallet-messages body-wallet-messages-light body-wallet-messages-gold-panel">
<div class="home-bg-media" aria-hidden="true">
    <img class="home-bg-image" th:src="@{/images/messages.png}" alt="">
    <div class="home-bg-overlay"></div>
</div>

<main class="wallet-landing reveal-item">
    <section class="wallet-panel wallet-panel--wide wallet-panel--messages wallet-panel--materialize reveal-child">
        <div class="form-panel-top form-panel-top--split auth-stagger">
            <a class="home-pill form-pill-link" th:href="@{/wallet}">Back to wallet</a>
            <form th:if="${!#lists.isEmpty(messages)}"
                  class="mailbox-delete-form mailbox-delete-form--top"
                  th:action="@{/wallet/messages/delete}"
                  method="post"
                  onsubmit="return confirm('Delete all your messages? This cannot be undone.');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="home-pill mailbox-delete-btn">Delete Messages</button>
            </form>
        </div>

        <h2 class="wallet-title wallet-title--center auth-stagger">Message Inbox</h2>
        <p class="wallet-form-hint auth-stagger" th:if="${unreadCount > 0}">
            You have <span th:text="${unreadCount}"></span> unread message(s) from an admin.
        </p>

        <div class="success auth-stagger" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error auth-stagger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="mailbox-list auth-stagger" th:if="${!#lists.isEmpty(messages)}">
            <a class="mailbox-item"
               th:each="message : ${messages}"
               th:href="@{/wallet/messages/{id}(id=${message.id})}"
               th:classappend="${message.fromAdmin and !message.readByRecipient} ? ' mailbox-item--unread' : ''">
                <div class="mailbox-item-top">
                    <span class="mailbox-item-from"
                          th:text="${message.fromAdmin}
                              ? |From: ${message.senderDisplayName}|
                              : |You sent to ${message.adminRecipientDisplayName}|"></span>
                    <span class="mailbox-item-date" th:text="${message.createdAt}"></span>
                </div>
                <p class="mailbox-item-preview" th:text="${message.preview}"></p>
                <span class="mailbox-item-badge"
                      th:if="${message.fromAdmin and !message.readByRecipient}">New</span>
            </a>
        </div>

        <p class="tx-empty auth-stagger" th:if="${#lists.isEmpty(messages)}">No messages yet.</p>
    </section>
</main>

<footer th:replace="~{fragments/app-footer :: footer}"></footer>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
