spring.application.name=ASWallet-Vol.2
#-----------------------------------------

#Data Source Properties
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/as_wallet?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=07808

#-----------------------------------------

#JPA Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=TRUE
#spring.jpa.properties.hibernate.show_sql = TRUE
spring.jpa.hibernate.ddl-auto=update

#-----------------------------------------

#Logging Levels
logging.level.org=WARN
logging.level.blog=WARN
#Show SQL executed with parameter bindings
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.type.descriptor=TRACE

#-----------------------------------------

# Mail Properties
spring.mail.host=smtp.abv.bg
spring.mail.port=465
spring.mail.username=aswallet.noreply@abv.bg
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#-----------------------------------------

#Enable virtual threads
#spring.threads.virtual.enabled = true

#-----------------------------------------

#server port
server.port=8080

#-----------------------------------------

# Listen on all network interfaces — required for LAN demo (phone/PC via http://192.168.x.x:8080)
server.address=0.0.0.0
server.forward-headers-strategy=framework
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.thymeleaf.cache=false

#-----------------------------------------

# Application
app.version=2.0.2
app.base-url=http://localhost:8080
app.password-reset.expiry-hours=1
app.password-reset.cleanup.cron=0 0 * * * *

#-----------------------------------------

# Default admin (created on first startup if missing)
app.admin.username=admin
app.admin.email=aswallet.noreply@abv.bg
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.card.number=${ADMIN_CARD_NUMBER:4111111111111111}
app.admin.card.holder=${ADMIN_CARD_HOLDER:ASWallet Admin}
app.admin.card.expiry-month=${ADMIN_CARD_EXPIRY_MONTH:12}
app.admin.card.expiry-year=${ADMIN_CARD_EXPIRY_YEAR:30}
app.admin.card.cvc=${ADMIN_CARD_CVC:123}

#-----------------------------------------

# Advanced: local avatar uploads
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB
app.upload.avatars-dir=uploads/avatars
app.avatar.default-image=/images/default-avatar.svg

#-----------------------------------------

# Advanced — pending transfer processing (Transfer A lite)
app.transfer.processing-delay-seconds=5
app.transfer.failure-rate=0.1
app.transfer.stale-minutes=15
app.transfer.process.cron=0 */1 * * * *
app.transfer.stale-check.fixed-delay-ms=300000

#-----------------------------------------

# Risk assessment microservice (ASWallet-Vol.2-svc)
app.risk-service.enabled=true
app.risk-service.base-url=http://localhost:8081
app.risk-service.fail-open=true

#-----------------------------------------

# Must match microservice app.security.api-key
app.risk-service.api-key=${RISK_SERVICE_API_KEY:aswallet-dev-api-key}
spring.cloud.openfeign.httpclient.hc5.enabled=true

#-----------------------------------------

# Advanced — daily withdraw limit (calendar day, non-admin users)
app.withdraw.daily-limit.min=50
app.withdraw.daily-limit.max=500
app.withdraw.daily-limit.step=50
app.withdraw.daily-limit.default=500
app.withdraw.day-timezone=Europe/Sofia

#-----------------------------------------